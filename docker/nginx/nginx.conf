# Docker embedded DNS — resolves Swarm service names to current healthy task
resolver 127.0.0.11 valid=5s ipv6=off;

# Rate limiting zone for API requests
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

# HTTP — redirect to HTTPS, except ACME challenge
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS termination, proxy, and landing page
server {
    listen 443 ssl;
    server_name _;

    # TLS certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/discweeds.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/discweeds.com/privkey.pem;

    # HSTS — browsers remember to always use HTTPS (2 year max-age)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # API proxy — uses variable to force DNS re-resolution per request
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        set $backend http://app:3001;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy
    location /ws {
        set $backend http://app:3001;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Downloads — serve app installers
    location /downloads/ {
        alias /usr/share/nginx/downloads/;
        autoindex off;
    }

    # Landing page (invite URLs and downloads)
    location / {
        root /usr/share/nginx/landing;
        try_files $uri $uri/ /index.html;
    }
}
