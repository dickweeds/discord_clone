# Production TURN/STUN configuration for coturn
# Used by docker-compose.yml (production deployment)

listening-port=3478
listening-ip=0.0.0.0
min-port=49152
max-port=49252

# Domain — must match your deployment domain
# Updated by scripts/setup.sh during initial deployment
realm=YOUR_DOMAIN

# Authentication — must match TURN_SECRET in .env
use-auth-secret
static-auth-secret=CHANGE_ME

fingerprint
no-multicast-peers
no-cli

# NAT traversal for EC2 deployment
# external-ip must be set to the EC2 public IP / private IP pair
# for TURN relay to work behind AWS NAT.
# Format: external-ip=PUBLIC_IP/PRIVATE_IP
# Example: external-ip=54.123.45.67/172.31.0.10
# Updated by scripts/setup.sh during initial deployment
# external-ip=EXTERNAL_IP/INTERNAL_IP

log-file=stdout
