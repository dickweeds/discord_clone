# Docker Swarm stack — deploy with: docker stack deploy -c docker-compose.yml --with-registry-auth discord-clone
# Coturn runs separately: docker compose -f docker-compose.coturn.yml up -d
services:
  app:
    image: ghcr.io/aidenwoodside/discord-clone-server:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      - PORT=3001
      - DB_POOL_MAX=20
      - RUN_MIGRATIONS=false
      - NODE_ENV=${NODE_ENV:-production}
      - MEDIASOUP_MIN_PORT=40000
      - MEDIASOUP_MAX_PORT=40049
      - MEDIASOUP_LISTEN_IP=${MEDIASOUP_LISTEN_IP:-0.0.0.0}
      - MEDIASOUP_ANNOUNCED_IP=${MEDIASOUP_ANNOUNCED_IP}
      - SERVER_NAME=${SERVER_NAME}
      - TURN_HOST=${TURN_HOST}
      - TURN_PORT=${TURN_PORT:-3478}
      - TURN_SECRET=${TURN_SECRET}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - GROUP_ENCRYPTION_KEY=${GROUP_ENCRYPTION_KEY}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - backend
    ports:
      - target: 3001
        published: 3001
        protocol: tcp
        mode: host
      # mediasoup RTP — short syntax required for port ranges (ingress mode on single-node is fine)
      - "40000-40049:40000-40049/udp"
    stop_grace_period: 30s
    read_only: true
    tmpfs:
      - /tmp
      - /home/appuser/.npm
    cap_drop:
      - ALL
    deploy:
      replicas: 1
      update_config:
        order: stop-first
        failure_action: rollback
        monitor: 30s
        delay: 5s
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /discord-clone/production/app
        awslogs-create-group: "true"
        tag: "app/{{ .ID }}"
        mode: "non-blocking"
        max-buffer-size: "4m"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    networks:
      - backend
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/landing:/usr/share/nginx/landing:ro
      - ./data/downloads:/usr/share/nginx/downloads:ro
      - ./data/certs:/etc/letsencrypt:ro
      - ./data/certbot-webroot:/var/www/certbot:ro
    deploy:
      replicas: 1
      update_config:
        order: start-first
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /discord-clone/production/nginx
        awslogs-create-group: "true"
        tag: "nginx/{{ .ID }}"
        mode: "non-blocking"
        max-buffer-size: "4m"

  certbot:
    image: certbot/certbot:v3.1.0
    networks:
      - backend
    volumes:
      - ./data/certs:/etc/letsencrypt
      - ./data/certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  backend:
    driver: overlay
