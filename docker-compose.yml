services:
  app-blue:
    image: ghcr.io/aidenwoodside/discord-clone-server:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      - PORT=3001
      - DB_POOL_MAX=20
      - RUN_MIGRATIONS=false
      - MEDIASOUP_MIN_PORT=40000
      - MEDIASOUP_MAX_PORT=40049
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-}
      - GROUP_ENCRYPTION_KEY=${GROUP_ENCRYPTION_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-}
    networks:
      - backend
    ports:
      - "3001:3001"
      - "40000-40049:40000-40049/udp"
    restart: unless-stopped
    stop_grace_period: 30s
    stop_signal: SIGTERM
    read_only: true
    tmpfs:
      - /tmp
      - /home/appuser/.npm
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /discord-clone/production/app
        awslogs-create-group: "true"
        tag: "app-blue/{{ .ID }}"
        mode: "non-blocking"
        max-buffer-size: "4m"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  app-green:
    image: ghcr.io/aidenwoodside/discord-clone-server:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      - PORT=3002
      - DB_POOL_MAX=20
      - RUN_MIGRATIONS=false
      - MEDIASOUP_MIN_PORT=40050
      - MEDIASOUP_MAX_PORT=40099
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-}
      - GROUP_ENCRYPTION_KEY=${GROUP_ENCRYPTION_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-}
    profiles:
      - deploy
    networks:
      - backend
    ports:
      - "3002:3002"
      - "40050-40099:40050-40099/udp"
    restart: unless-stopped
    stop_grace_period: 30s
    stop_signal: SIGTERM
    read_only: true
    tmpfs:
      - /tmp
      - /home/appuser/.npm
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /discord-clone/production/app
        awslogs-create-group: "true"
        tag: "app-green/{{ .ID }}"
        mode: "non-blocking"
        max-buffer-size: "4m"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3002/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Justified: coturn needs 100+ UDP ports for TURN relay (49152-49252).
  # Publishing this range via bridge would be impractical.
  coturn:
    image: coturn/coturn:4.6.3
    network_mode: host
    volumes:
      - ./docker/coturn/turnserver.prod.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine
    networks:
      - backend
    ports:
      - "80:80"
      - "443:443"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/landing:/usr/share/nginx/landing:ro
      - ./data/downloads:/usr/share/nginx/downloads:ro
      - ./data/certs:/etc/letsencrypt:ro
      - ./data/certbot-webroot:/var/www/certbot:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /discord-clone/production/nginx
        awslogs-create-group: "true"
        tag: "nginx/{{ .ID }}"
        mode: "non-blocking"
        max-buffer-size: "4m"

  certbot:
    image: certbot/certbot:v3.1.0
    networks:
      - backend
    volumes:
      - ./data/certs:/etc/letsencrypt
      - ./data/certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'
    depends_on:
      - nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  backend:
    driver: bridge
