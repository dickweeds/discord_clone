services:
  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    network_mode: host
    volumes:
      - ./data/sqlite:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    volumes:
      - ./docker/coturn/turnserver.prod.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    network_mode: host
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/landing:/usr/share/nginx/landing:ro
      - ./data/downloads:/usr/share/nginx/downloads:ro
      - ./data/certs:/etc/letsencrypt:ro
      - ./data/certbot-webroot:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./data/certs:/etc/letsencrypt
      - ./data/certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'
    depends_on:
      - nginx
    restart: unless-stopped
