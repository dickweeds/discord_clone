name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            chore
            ci
            docs
            deps
            refactor
            test
            perf
            revert

  check-paths:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
      shared: ${{ steps.filter.outputs.shared }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'
            shared:
              - 'shared/**'
              - 'package-lock.json'
              - 'tsconfig.base.json'
            infra:
              - 'infrastructure/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w shared

      - name: Lint
        run: npm run lint

  test-client:
    runs-on: ubuntu-latest
    needs: [check-paths]
    if: needs.check-paths.outputs.client == 'true' || needs.check-paths.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w shared

      - name: Test shared
        run: npm test -w shared

      - name: Test client
        run: npm test -w client

      - name: Build client
        run: npm run build -w client

  test-server:
    runs-on: ubuntu-latest
    needs: [check-paths]
    if: needs.check-paths.outputs.server == 'true' || needs.check-paths.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w shared

      - name: Test shared
        run: npm test -w shared

      - name: Test server
        run: npm test -w server

      - name: Build server
        run: npm run build -w server

      - name: Validate Docker Compose config
        run: |
          cp .env.example .env
          echo "IMAGE_TAG=ci-test" >> .env
          docker compose config --quiet
          rm .env

  trivy-scan:
    runs-on: ubuntu-latest
    needs: [check-paths]
    if: needs.check-paths.outputs.server == 'true' || needs.check-paths.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build server image for scanning
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          file: server/Dockerfile
          push: false
          load: true
          tags: discord-clone-server:ci-scan

      - name: Scan image for vulnerabilities
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b $HOME/.local/bin
          export PATH="$HOME/.local/bin:$PATH"
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            --format table \
            discord-clone-server:ci-scan

  terraform-validate:
    runs-on: ubuntu-latest
    needs: [check-paths]
    if: needs.check-paths.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - name: Terraform Init (no backend)
        run: cd infrastructure && terraform init -backend=false
      - name: Terraform Validate
        run: cd infrastructure && terraform validate
      - name: Terraform Format Check
        run: cd infrastructure && terraform fmt -check -recursive

  ci-gate:
    if: always()
    needs: [lint-pr-title, lint, test-client, test-server, trivy-scan, terraform-validate]
    runs-on: ubuntu-latest
    steps:
      - name: Check all job results
        run: |
          results=("${{ needs.lint-pr-title.result }}" "${{ needs.lint.result }}" "${{ needs.test-client.result }}" "${{ needs.test-server.result }}" "${{ needs.trivy-scan.result }}" "${{ needs.terraform-validate.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "CI failed: one or more jobs returned $r"
              exit 1
            fi
          done
          echo "All CI jobs passed or were skipped"
