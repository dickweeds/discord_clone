name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-paths:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infrastructure/**'

  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w shared

      - name: Lint
        run: npm run lint

      - name: Test shared
        run: npm test -w shared

      - name: Test server
        run: npm test -w server

      - name: Test client
        run: npm test -w client

      - name: Build server
        run: npm run build -w server

      - name: Build client
        run: npm run build -w client

      - name: Validate Docker Compose config
        run: |
          cp .env.example .env
          echo "IMAGE_TAG=ci-test" >> .env
          docker compose config --quiet
          rm .env

  terraform-validate:
    runs-on: ubuntu-latest
    needs: [check-paths]
    if: needs.check-paths.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - name: Terraform Init (no backend)
        run: cd infrastructure && terraform init -backend=false
      - name: Terraform Validate
        run: cd infrastructure && terraform validate
      - name: Terraform Format Check
        run: cd infrastructure && terraform fmt -check -recursive
