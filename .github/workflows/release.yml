# Release Process (fully automated via release-please):
# 1. Merge PRs to main using Conventional Commit prefixes (fix:, feat:, etc.)
# 2. release-please automatically opens/updates a Release PR
# 3. Merge the Release PR when ready to release
# 4. release-please creates the v* tag, triggering this workflow
#
# Conditional builds: only client or server jobs run based on what changed
# since the previous tag. shared/ changes trigger both sides.
#
# Deployment Secrets:
#   AWS_DEPLOY_ROLE_ARN — IAM role ARN for OIDC-federated deploy
#   EC2_INSTANCE_ID     — Target EC2 instance ID

name: Release

on:
  push:
    tags: ['v*']

# Deny all permissions by default — each job declares its own
permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches package.json version
        run: |
          TAG="${{ github.ref_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "ERROR: Git tag ($TAG) does not match client/package.json version ($PKG_VERSION)"
            echo "Update client/package.json version to match your tag, or re-tag."
            exit 1
          fi
          echo "Version validated: $TAG matches $PKG_VERSION"

  detect-changes:
    needs: [validate-version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      client_changed: ${{ steps.changes.outputs.client_changed }}
      server_changed: ${{ steps.changes.outputs.server_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths since previous tag
        id: changes
        run: |
          CURRENT_TAG="${{ github.ref_name }}"

          # Find previous tag (version-sorted, pick the one after current)
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)

          # First tag ever, or only one tag — build everything
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            echo "No previous tag — full build"
            echo "client_changed=true" >> "$GITHUB_OUTPUT"
            echo "server_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparing $PREV_TAG..$CURRENT_TAG"
          CHANGED_FILES=$(git diff --name-only "$PREV_TAG".."$CURRENT_TAG")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          CLIENT=false
          SERVER=false

          while IFS= read -r file; do
            case "$file" in
              client/*)                         CLIENT=true ;;
              server/*)                         SERVER=true ;;
              shared/*)                         CLIENT=true; SERVER=true ;;
              package-lock.json)                CLIENT=true; SERVER=true ;;
              tsconfig.base.json)               CLIENT=true; SERVER=true ;;
              .github/workflows/release.yml)    CLIENT=true; SERVER=true ;;
              .dockerignore)                    SERVER=true ;;
              docker-compose.yml)               SERVER=true ;;
              docker/*)                         SERVER=true ;;
              scripts/*)                        SERVER=true ;;
            esac
          done <<< "$CHANGED_FILES"

          echo "client_changed=$CLIENT" >> "$GITHUB_OUTPUT"
          echo "server_changed=$SERVER" >> "$GITHUB_OUTPUT"
          echo "Results: client_changed=$CLIENT, server_changed=$SERVER"

  build-electron:
    needs: [validate-version, detect-changes]
    if: needs.detect-changes.outputs.client_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w shared

      - name: Build client
        run: npm run build -w client

      - name: Build Electron app
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cd client && npx electron-builder --publish never -c.extraMetadata.version=$VERSION

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: |
            client/dist/*.AppImage
            client/dist/*.dmg
            client/dist/*Setup*.exe
          if-no-files-found: error

  build-server-image:
    needs: [validate-version, detect-changes]
    if: needs.detect-changes.outputs.server_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/aidenwoodside/discord-clone-server:${{ github.sha }}
            ghcr.io/aidenwoodside/discord-clone-server:${{ github.ref_name }}
            ghcr.io/aidenwoodside/discord-clone-server:latest
          cache-from: type=registry,ref=ghcr.io/aidenwoodside/discord-clone-server:buildcache
          cache-to: type=registry,ref=ghcr.io/aidenwoodside/discord-clone-server:buildcache,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: ghcr.io/aidenwoodside/discord-clone-server:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  publish-release:
    needs: [detect-changes, build-electron]
    if: |
      always() &&
      needs.detect-changes.outputs.client_changed == 'true' &&
      needs.build-electron.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # Find draft releases for this tag and publish them
          RELEASE_IDS=$(gh api repos/AidenWoodside/discord_clone/releases --jq "[.[] | select(.tag_name==\"$TAG\") | .id] | .[]")
          if [ -n "$RELEASE_IDS" ]; then
            echo "$RELEASE_IDS" | while read -r ID; do
              gh api --method PATCH "repos/AidenWoodside/discord_clone/releases/$ID" -f draft=false
              echo "Published release $TAG (ID: $ID)"
            done
          else
            # Check if a published release already exists
            PUBLISHED=$(gh api repos/AidenWoodside/discord_clone/releases/tags/$TAG --jq '.id' 2>/dev/null || echo "")
            if [ -n "$PUBLISHED" ]; then
              echo "Release $TAG is already published"
            else
              echo "ERROR: No draft or published release found for $TAG"
              echo "electron-builder may have created the release under a different tag."
              exit 1
            fi
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: electron-*
          merge-multiple: true

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release upload "$TAG" artifacts/* --clobber

      - name: Prepare download assets for landing page
        run: |
          mkdir -p downloads

          # Copy installers with stable filenames (strip version numbers)
          for f in artifacts/*; do
            NAME=$(basename "$f")
            case "$NAME" in
              *Setup*.exe)
                cp "$f" downloads/Discord-Clone-Setup.exe
                echo "Saved $NAME as Discord-Clone-Setup.exe"
                ;;
              *.dmg)
                if [[ "$NAME" != *arm64* ]]; then
                  cp "$f" downloads/Discord-Clone.dmg
                  echo "Saved $NAME as Discord-Clone.dmg"
                fi
                ;;
              *.AppImage)
                cp "$f" downloads/Discord-Clone.AppImage
                echo "Saved $NAME as Discord-Clone.AppImage"
                ;;
            esac
          done

          ls -la downloads/

      - name: Upload download assets to S3
        run: aws s3 cp downloads/ s3://discord-clone-assets-966917019849/ --recursive

  deploy-server:
    needs: [detect-changes, build-server-image, publish-release]
    if: |
      always() &&
      needs.detect-changes.outputs.server_changed == 'true' &&
      needs.build-server-image.result == 'success' &&
      (needs.publish-release.result == 'success' || needs.publish-release.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync config files via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 60 \
            --parameters 'commands=["export HOME=/root && export PATH=$PATH:/usr/local/bin:/usr/bin && git config --global --add safe.directory /home/ubuntu/discord_clone && cd /home/ubuntu/discord_clone && git fetch origin main && git checkout origin/main -- docker-compose.yml docker/ scripts/ && aws s3 sync s3://discord-clone-assets-966917019849/ data/downloads/"]' \
            --query "Command.CommandId" --output text)

          for i in $(seq 1 15); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success) echo "Config sync succeeded"; break ;;
              Failed|TimedOut|Cancelled) echo "Config sync failed: $STATUS"; exit 1 ;;
              *) sleep 4 ;;
            esac
            [ "$i" -eq 15 ] && { echo "Timed out waiting for config sync"; exit 1; }
          done

      - name: Deploy via SSM
        run: |
          # Timeout budget: pull (~30s) + health check (~60s) + migration (~30s)
          # + drain (~30s) + nginx switch (~5s) + buffer (~145s) = 300s
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters 'commands=["export HOME=/root && export PATH=$PATH:/usr/local/bin:/usr/bin && bash /home/ubuntu/discord_clone/scripts/deploy.sh ${{ github.ref_name }}"]' \
            --query "Command.CommandId" --output text)

          # Poll with structured status parsing — never grep mixed output
          # Poll timeout (65 x 5s = 325s) slightly exceeds SSM timeout (300s)
          # so SSM reports failure first rather than the poll giving up prematurely
          for i in $(seq 1 65); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            case "$STATUS" in
              Success)
                echo "Deploy succeeded"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardOutputContent" --output text
                break ;;
              Failed|TimedOut|Cancelled)
                echo "Deploy failed with status: $STATUS"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardErrorContent" --output text
                exit 1 ;;
              *) sleep 5 ;;
            esac
            [ "$i" -eq 65 ] && { echo "Timed out waiting for SSM command"; exit 1; }
          done

      - name: Notify on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "**Deploy FAILED:** `${{ github.ref_name }}` — [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}' \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}"
