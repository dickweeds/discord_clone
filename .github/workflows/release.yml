# Release Process (fully automated):
# 1. Update version in client/package.json
# 2. Commit: "Release vX.Y.Z"
# 3. Tag: git tag vX.Y.Z
# 4. Push: git push && git push --tags
# Everything else happens automatically.
#
# Deployment Secrets (required for auto-deploy to EC2):
#   EC2_SSH_KEY     — Private SSH key for EC2 access (dedicated deploy key recommended)
#   EC2_HOST        — EC2 public IP or domain name
#   EC2_USER        — SSH username (e.g., "ubuntu")
#   EC2_DEPLOY_PATH — Absolute path to repo on EC2 (e.g., "/home/ubuntu/discord_clone")

name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-electron:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w shared

      - name: Build client
        run: npm run build -w client

      - name: Build and publish Electron app
        run: cd client && npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: [build-electron]
    if: needs.build-electron.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # Find the draft release for this tag and publish it
          RELEASE_ID=$(gh api repos/AidenWoodside/discord_clone/releases --jq ".[] | select(.tag_name==\"$TAG\") | .id")
          if [ -n "$RELEASE_ID" ]; then
            gh api --method PATCH "repos/AidenWoodside/discord_clone/releases/$RELEASE_ID" -f draft=false
            echo "Published release $TAG"
          else
            echo "No draft release found for $TAG — it may already be published"
          fi

  deploy-server:
    needs: [publish-release]
    if: needs.publish-release.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets for landing page
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p downloads
          TAG="${{ github.ref_name }}"

          # Download assets using gh CLI (handles auth for private repos)
          gh release download "$TAG" --repo AidenWoodside/discord_clone --dir downloads_raw || {
            echo "ERROR: Could not download release assets for $TAG"
            exit 1
          }

          # Copy installers with stable filenames (strip version numbers)
          for f in downloads_raw/*; do
            NAME=$(basename "$f")
            case "$NAME" in
              *Setup*.exe)
                cp "$f" downloads/Discord-Clone-Setup.exe
                echo "Saved $NAME as Discord-Clone-Setup.exe"
                ;;
              *.dmg)
                if [[ "$NAME" != *arm64* ]]; then
                  cp "$f" downloads/Discord-Clone.dmg
                  echo "Saved $NAME as Discord-Clone.dmg"
                fi
                ;;
              *.AppImage)
                cp "$f" downloads/Discord-Clone.AppImage
                echo "Saved $NAME as Discord-Clone.AppImage"
                ;;
            esac
          done

          ls -la downloads/

      - name: Upload downloads to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "downloads/*"
          target: "${{ secrets.EC2_DEPLOY_PATH }}/data/"
          strip_components: 0

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd "${{ secrets.EC2_DEPLOY_PATH }}"

            # Save current state for rollback
            PREV_COMMIT=$(git rev-parse HEAD)
            CURRENT_IMAGE_ID=$(sudo docker compose images app -q 2>/dev/null || echo "")
            if [ -n "$CURRENT_IMAGE_ID" ]; then
              sudo docker tag "$CURRENT_IMAGE_ID" app:rollback
              echo "Saved current image for rollback: $CURRENT_IMAGE_ID"
            fi

            # Deploy: pull latest code, rebuild, restart
            git pull origin main || { echo "DEPLOY FAILED — git pull failed"; exit 1; }
            sudo docker compose build app || {
              echo "DEPLOY FAILED — docker build failed. Reverting git..."
              git checkout "$PREV_COMMIT"
              exit 1
            }
            sudo docker compose up -d app nginx

            # Health check: 30 attempts, 2s apart = 60s timeout
            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:3000/api/health > /dev/null 2>&1; then
                echo "Deploy successful — health check passed on attempt $i"
                sudo docker rmi app:rollback 2>/dev/null || true
                exit 0
              fi
              echo "Attempt $i/30 — waiting..."
              sleep 2
            done

            # Health check failed — rollback
            echo "DEPLOY FAILED — health check timed out after 60s. Rolling back..."
            git checkout "$PREV_COMMIT"
            if sudo docker image inspect app:rollback > /dev/null 2>&1; then
              COMPOSE_PROJECT=$(basename "$(pwd)")
              sudo docker tag app:rollback "${COMPOSE_PROJECT}-app:latest"
              sudo docker compose up -d --force-recreate app
              sudo docker rmi app:rollback 2>/dev/null || true
              echo "Rollback complete"
            else
              echo "No rollback image available (first deploy). Manual intervention required."
            fi
            exit 1
