# Release Process (fully automated):
# 1. Update version in root package.json (single source of truth)
# 2. Commit: "Release vX.Y.Z"
# 3. Tag: git tag vX.Y.Z
# 4. Push: git push && git push --tags
# Everything else happens automatically.
#
# Deployment Secrets:
#   AWS_DEPLOY_ROLE_ARN — IAM role ARN for OIDC-federated deploy
#   EC2_INSTANCE_ID     — Target EC2 instance ID

name: Release

on:
  push:
    tags: ['v*']

# Deny all permissions by default — each job declares its own
permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        run: |
          TAG="${{ github.ref_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "ERROR: Git tag ($TAG) does not match client/package.json version ($PKG_VERSION)"
            echo "Update client/package.json version to match your tag, or re-tag."
            exit 1
          fi
          echo "Version validated: $TAG matches $PKG_VERSION"

  build-electron:
    needs: [validate-version]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w shared

      - name: Build client
        run: npm run build -w client

      - name: Build and publish Electron app
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cd client && npx electron-builder --publish always -c.extraMetadata.version=$VERSION
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-server-image:
    needs: [validate-version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.9.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6.14.0
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/aidenwoodside/discord-clone-server:${{ github.sha }}
            ghcr.io/aidenwoodside/discord-clone-server:${{ github.ref_name }}
            ghcr.io/aidenwoodside/discord-clone-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/aidenwoodside/discord-clone-server:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  publish-release:
    needs: [build-electron]
    if: needs.build-electron.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # Find draft releases for this tag and publish them
          RELEASE_IDS=$(gh api repos/AidenWoodside/discord_clone/releases --jq "[.[] | select(.tag_name==\"$TAG\") | .id] | .[]")
          if [ -n "$RELEASE_IDS" ]; then
            echo "$RELEASE_IDS" | while read -r ID; do
              gh api --method PATCH "repos/AidenWoodside/discord_clone/releases/$ID" -f draft=false
              echo "Published release $TAG (ID: $ID)"
            done
          else
            # Check if a published release already exists
            PUBLISHED=$(gh api repos/AidenWoodside/discord_clone/releases/tags/$TAG --jq '.id' 2>/dev/null || echo "")
            if [ -n "$PUBLISHED" ]; then
              echo "Release $TAG is already published"
            else
              echo "ERROR: No draft or published release found for $TAG"
              echo "electron-builder may have created the release under a different tag."
              exit 1
            fi
          fi

  deploy-server:
    needs: [publish-release, build-server-image]
    if: needs.publish-release.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download release assets for landing page
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p downloads
          TAG="${{ github.ref_name }}"

          # Download assets using gh CLI (handles auth for private repos)
          gh release download "$TAG" --repo AidenWoodside/discord_clone --dir downloads_raw || {
            echo "ERROR: Could not download release assets for $TAG"
            exit 1
          }

          # Copy installers with stable filenames (strip version numbers)
          for f in downloads_raw/*; do
            NAME=$(basename "$f")
            case "$NAME" in
              *Setup*.exe)
                cp "$f" downloads/Discord-Clone-Setup.exe
                echo "Saved $NAME as Discord-Clone-Setup.exe"
                ;;
              *.dmg)
                if [[ "$NAME" != *arm64* ]]; then
                  cp "$f" downloads/Discord-Clone.dmg
                  echo "Saved $NAME as Discord-Clone.dmg"
                fi
                ;;
              *.AppImage)
                cp "$f" downloads/Discord-Clone.AppImage
                echo "Saved $NAME as Discord-Clone.AppImage"
                ;;
            esac
          done

          ls -la downloads/

      - name: Upload download assets to S3
        run: aws s3 cp downloads/ s3://discord-clone-assets-966917019849/ --recursive

      - name: Sync config files via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 60 \
            --parameters 'commands=["cd /home/ubuntu/discord_clone && git fetch origin main && git checkout origin/main -- docker-compose.yml docker/ scripts/ landing/ && aws s3 sync s3://discord-clone-assets-966917019849/ data/downloads/"]' \
            --query "Command.CommandId" --output text)

          for i in $(seq 1 15); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success) echo "Config sync succeeded"; break ;;
              Failed|TimedOut|Cancelled) echo "Config sync failed: $STATUS"; exit 1 ;;
              *) sleep 4 ;;
            esac
            [ "$i" -eq 15 ] && { echo "Timed out waiting for config sync"; exit 1; }
          done

      - name: Deploy via SSM
        run: |
          # Timeout budget: pull (~30s) + health check (~60s) + migration (~30s)
          # + drain (~30s) + nginx switch (~5s) + buffer (~145s) = 300s
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters 'commands=["bash /home/ubuntu/discord_clone/scripts/deploy.sh ${{ github.ref_name }}"]' \
            --query "Command.CommandId" --output text)

          # Poll with structured status parsing — never grep mixed output
          # Poll timeout (65 x 5s = 325s) slightly exceeds SSM timeout (300s)
          # so SSM reports failure first rather than the poll giving up prematurely
          for i in $(seq 1 65); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            case "$STATUS" in
              Success)
                echo "Deploy succeeded"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardOutputContent" --output text
                break ;;
              Failed|TimedOut|Cancelled)
                echo "Deploy failed with status: $STATUS"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardErrorContent" --output text
                exit 1 ;;
              *) sleep 5 ;;
            esac
            [ "$i" -eq 65 ] && { echo "Timed out waiting for SSM command"; exit 1; }
          done

      - name: Notify on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "**Deploy FAILED:** `${{ github.ref_name }}` — [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}' \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}"
