# Local development: docker compose -f docker-compose.dev.yml up -d
# Then set in .env: DATABASE_URL=postgresql://discord_clone:dev_password@localhost:5432/discord_clone_dev
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: discord_clone
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: discord_clone_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord_clone"]
      interval: 5s
      timeout: 3s
      retries: 5

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    volumes:
      - ./docker/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped

volumes:
  pgdata:
